<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <!-- physics -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>

    <!-- super hands -->
    <script src="https://unpkg.com/aframe-super-hands-component@4.0.2/dist/aframe-super-hands-component.min.js"></script>

    <script>
      // POHYB: levý joystick = pohyb, pravý = rotace
      AFRAME.registerComponent("vr-movement", {
        tick: function () {
          const rig = document.querySelector("#rig");

          const session = this.el.sceneEl.xrSession;
          if (!session) return;

          session.inputSources.forEach((input) => {
            if (!input.gamepad) return;

            const axes = input.gamepad.axes;

            // LEVÝ joystick → pohyb (forward / strafe)
            if (axes.length >= 2) {
              const x = axes[2] || 0;
              const y = axes[3] || 0;

              const speed = 0.05;

              const rotationY = rig.object3D.rotation.y;

              // forward/back
              rig.object3D.position.x -= Math.sin(rotationY) * y * speed;
              rig.object3D.position.z -= Math.cos(rotationY) * y * speed;

              // strafe
              rig.object3D.position.x -= Math.cos(rotationY) * x * speed;
              rig.object3D.position.z += Math.sin(rotationY) * x * speed;
            }

            // PRAVÝ joystick → otáčení
            if (axes.length >= 4) {
              const rx = axes[2] || 0;
              rig.object3D.rotation.y -= rx * 0.03;
            }
          });
        },
      });
    </script>
  </head>

  <body>
    <a-scene vr-movement physics="gravity: -9.8">

      <!-- PLAYER RIG -->
      <a-entity id="rig">

        <!-- HLAVA -->
        <a-entity camera position="0 1.6 0"></a-entity>

        <!-- RUCE -->
        <a-entity
          hand-controls="hand: left"
          super-hands="colliderEvent: collisions; grabStartButtons: triggerdown; grabEndButtons: triggerup"
        ></a-entity>

        <a-entity
          hand-controls="hand: right"
          super-hands="colliderEvent: collisions; grabStartButtons: triggerdown; grabEndButtons: triggerup"
        ></a-entity>

      </a-entity>

      <!-- ZEM -->
      <a-plane rotation="-90 0 0" width="50" height="50" color="green"></a-plane>

      <!-- ZBRAŇ -->
      <a-entity
        class="grabbable"
        grabbable
        dynamic-body="mass: 1"
        position="0 1.2 -1"
      >
        <a-box depth="0.1" height="0.2" width="0.05" color="black"></a-box>
        <a-box position="0 0.05 -0.2" depth="0.3" height="0.05" width="0.05" color="gray"></a-box>
      </a-entity>

      <!-- TARGETY (také grabbable pro test) -->
      <a-sphere
        class="grabbable"
        grabbable
        dynamic-body="mass: 1"
        position="0 1 -4"
        radius="0.3"
        color="blue"
      ></a-sphere>

      <a-sphere
        class="grabbable"
        grabbable
        dynamic-body="mass: 1"
        position="2 1 -5"
        radius="0.3"
        color="blue"
      ></a-sphere>

    </a-scene>
  </body>
</html>
