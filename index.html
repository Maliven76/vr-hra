<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <!-- komponenta pro grab -->
    <script src="https://unpkg.com/aframe-super-hands-component@4.0.2/dist/aframe-super-hands-component.min.js"></script>
  </head>

  <body>
    <a-scene>

      <!-- kamera -->
      <a-entity camera position="0 1.6 0"></a-entity>

      <!-- LEVÁ RUKA -->
      <a-entity
        hand-controls="hand: left"
        super-hands
      ></a-entity>

      <!-- PRAVÁ RUKA -->
      <a-entity
        hand-controls="hand: right"
        super-hands
      ></a-entity>

      <!-- zem -->
      <a-plane rotation="-90 0 0" width="10" height="10" color="green"></a-plane>

      <!-- "zbraň" (jednoduchý model) -->
      <a-box
        position="0 1 -2"
        depth="0.5"
        height="0.2"
        width="1"
        color="black"
        class="grabbable"
      ></a-box>

    </a-scene>
  </body>
</html>
