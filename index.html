<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <title>VR FPS Hra</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
<div id="info">VR: P joystick = pohyb, L joystick = otáčení, Grip = uchopení</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/webxr/VRButton.js"></script>

<script>
let scene, camera, renderer;
let controller1, controller2;
let grabbed = new Map();
let moveSpeed = 0.05;
let tempMatrix = new THREE.Matrix4();

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x202025);

  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1.6, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);
  document.body.appendChild(VRButton.createButton(renderer));

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5, 10, 7);
  scene.add(light);

  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(50, 50),
    new THREE.MeshStandardMaterial({ color: 0x444444 })
  );
  floor.rotation.x = -Math.PI / 2;
  scene.add(floor);

  // malé kostky s "fyzikou" (simulovanou)
  for (let i = 0; i < 10; i++) {
    const cube = new THREE.Mesh(
      new THREE.BoxGeometry(0.2, 0.2, 0.2),
      new THREE.MeshStandardMaterial({ color: 0x00ffcc })
    );
    cube.position.set((Math.random()-0.5)*10, 0.5, (Math.random()-0.5)*10);
    cube.userData.velocity = new THREE.Vector3(0,0,0);
    scene.add(cube);
  }

  // controllers
  controller1 = renderer.xr.getController(0);
  controller2 = renderer.xr.getController(1);
  scene.add(controller1);
  scene.add(controller2);

  setupController(controller1);
  setupController(controller2);

  window.addEventListener('resize', onWindowResize);
}

function setupController(controller) {
  controller.addEventListener('selectstart', () => {});
  controller.addEventListener('selectend', () => {});

  controller.addEventListener('connected', (event) => {
    const data = event.data;
    controller.gamepad = data.gamepad;
  });

  controller.addEventListener('disconnected', () => {
    delete controller.gamepad;
  });

  controller.userData.grabbing = null;

  controller.addEventListener('selectstart', () => grabObject(controller));
  controller.addEventListener('selectend', () => releaseObject(controller));
}

function grabObject(controller) {
  const origin = controller.position.clone();
  let closest = null;
  let minDist = 0.5;

  scene.traverse((obj) => {
    if (obj.isMesh && obj.geometry.type === "BoxGeometry" && obj.geometry.parameters.width < 1) {
      const dist = obj.position.distanceTo(origin);
      if (dist < minDist) {
        closest = obj;
        minDist = dist;
      }
    }
  });

  if (closest) {
    controller.attach(closest);
    controller.userData.grabbing = closest;
  }
}

function releaseObject(controller) {
  if (controller.userData.grabbing) {
    const obj = controller.userData.grabbing;
    scene.attach(obj);
    controller.userData.grabbing = null;
  }
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function handleMovement() {
  const session = renderer.xr.getSession();
  if (!session) return;

  const inputSources = session.inputSources;

  inputSources.forEach((source) => {
    if (!source.gamepad) return;

    const axes = source.gamepad.axes;
    const x = axes[2] || 0;
    const y = axes[3] || 0;

    // L joystick = rotace
    camera.rotation.y -= x * 0.05;

    // P joystick = pohyb
    const forward = new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation);
    const right = new THREE.Vector3(1, 0, 0).applyEuler(camera.rotation);

    camera.position.addScaledVector(forward, -y * moveSpeed);
    camera.position.addScaledVector(right, x * moveSpeed);
  });
}

function animate() {
  renderer.setAnimationLoop(render);
}

function render() {
  handleMovement();

  // jednoduchá "fyzika" kostek
  scene.traverse((obj) => {
    if (obj.isMesh && obj.userData.velocity) {
      obj.userData.velocity.y -= 0.001;
      obj.position.add(obj.userData.velocity);

      if (obj.position.y < 0.1) {
        obj.position.y = 0.1;
        obj.userData.velocity.y = 0;
      }
    }
  });

  renderer.render(scene, camera);
}
</script>
</body>
</html
