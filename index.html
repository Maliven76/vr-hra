<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-super-hands-component@4.0.2/dist/aframe-super-hands-component.min.js"></script>

    <script>
      // POHYB - joystick chůze + otáčení
      AFRAME.registerComponent("vr-movement", {
        tick: function () {
          const camera = document.querySelector("[camera]");
          const rig = document.querySelector("#rig");

          const session = this.el.sceneEl.xrSession;
          if (!session) return;

          const inputSources = session.inputSources;

          inputSources.forEach((input) => {
            if (!input.gamepad) return;

            const axes = input.gamepad.axes;

            // levý joystick = chůze (forward/back + strafe)
            if (axes.length >= 2) {
              const x = axes[2] || 0;
              const y = axes[3] || 0;

              const speed = 0.05;

              // pohyb relativně ke směru kamery
              const rotation = camera.object3D.rotation.y;

              rig.object3D.position.x -= Math.sin(rotation) * y * speed;
              rig.object3D.position.z -= Math.cos(rotation) * y * speed;

              rig.object3D.position.x -= Math.cos(rotation) * x * speed;
              rig.object3D.position.z += Math.sin(rotation) * x * speed;
            }

            // pravý joystick = otáčení
            if (axes.length >= 4) {
              const rx = axes[2] || 0;
              rig.object3D.rotation.y -= rx * 0.03;
            }
          });
        },
      });

      // STŘELBA
      AFRAME.registerComponent("gun", {
        init: function () {
          this.el.addEventListener("triggerdown", () => {
            const scene = document.querySelector("a-scene");

            let bullet = document.createElement("a-sphere");
            bullet.setAttribute("radius", "0.03");
            bullet.setAttribute("color", "yellow");

            let pos = this.el.object3D.getWorldPosition(new THREE.Vector3());
            bullet.setAttribute("position", pos);

            let dir = new THREE.Vector3();
            this.el.object3D.getWorldDirection(dir);
            dir.multiplyScalar(-10);

            bullet.setAttribute("velocity", dir);
            bullet.setAttribute("dynamic-body", "mass: 0.1");

            scene.appendChild(bullet);

            setTimeout(() => bullet.remove(), 3000);
          });
        },
      });

      // TARGET HIT
      AFRAME.registerComponent("target", {
        init: function () {
          this.el.addEventListener("collide", () => {
            this.el.remove();
          });
        },
      });
    </script>
  </head>

  <body>
    <a-scene vr-movement>

      <!-- RIG (kamera + pohyb) -->
      <a-entity id="rig" position="0 0 0">
        <a-entity camera position="0 1.6 0"></a-entity>
      </a-entity>

      <!-- RUCE (upravené pozice) -->
      <a-entity hand-controls="hand: left; handModelStyle: lowPoly"></a-entity>

      <a-entity
        hand-controls="hand: right; handModelStyle: lowPoly"
        id="rightHand"
      ></a-entity>

      <!-- zem -->
      <a-plane rotation="-90 0 0" width="50" height="50" color="green"></a-plane>

      <!-- MENŠÍ ZBRAŇ -->
      <a-box
        position="0 1.2 -0.5"
        depth="0.2"
        height="0.1"
        width="0.4"
        color="black"
        class="grabbable"
        gun
      ></a-box>

      <!-- TARGETY -->
      <a-sphere position="0 1 -4" radius="0.3" color="blue" target></a-sphere>
      <a-sphere position="2 1 -5" radius="0.3" color="blue" target></a-sphere>
      <a-sphere position="-2 1 -5" radius="0.3" color="blue" target></a-sphere>

    </a-scene>
  </body>
</html>
